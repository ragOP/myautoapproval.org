<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdFlow v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

:root {
  --bg: #0c0c0e;
  --s1: #111114;
  --s2: #17171b;
  --s3: #1e1e24;
  --s4: #26262e;
  --br: #2e2e38;
  --br2: #3a3a48;
  --acc: #ff5c38;
  --acc2: #38c9ff;
  --acc3: #7fff6e;
  --gold: #ffc244;
  --txt: #f0f0f4;
  --txt2: #8888a0;
  --txt3: #50505e;
  --r: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: 48px;
  background: var(--s1);
  border-bottom: 1px solid var(--br);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 50;
}
.brand {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  letter-spacing: -0.3px;
  color: var(--txt);
  display: flex;
  align-items: baseline;
  gap: 2px;
}
.brand-dot { color: var(--acc); font-size: 24px; line-height: 0; margin-bottom: -2px; }
.topbar-div { width: 1px; height: 18px; background: var(--br); }
.topbar-label { font-size: 11px; color: var(--txt3); }

/* step tabs */
.steps {
  display: flex;
  gap: 1px;
  margin-left: auto;
  background: var(--s3);
  border: 1px solid var(--br);
  border-radius: 8px;
  padding: 3px;
}
.stab {
  padding: 4px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--txt3);
  transition: all 0.15s;
  border: none;
  background: transparent;
  font-family: 'Geist', sans-serif;
  white-space: nowrap;
}
.stab:hover { color: var(--txt2); }
.stab.active { background: var(--acc); color: white; }
.stab.done { color: var(--acc3); }
.stab.done::before { content: '✓ '; }

/* key bar */
.keybar {
  display: flex;
  gap: 6px;
  align-items: center;
}
.keybar input {
  width: 220px;
  background: var(--s3);
  border: 1px solid var(--br);
  border-radius: 6px;
  color: var(--txt);
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  outline: none;
}
.keybar input:focus { border-color: var(--acc); }
.ksaved { font-size: 11px; color: var(--acc3); font-weight: 600; }

/* ── BODY ── */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── LEFT ── */
.left {
  width: 380px;
  flex-shrink: 0;
  background: var(--s1);
  border-right: 1px solid var(--br);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.left-head {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--br);
  flex-shrink: 0;
}
.left-title {
  font-family: 'Instrument Serif', serif;
  font-size: 17px;
  margin-bottom: 3px;
}
.left-hint { font-size: 11px; color: var(--txt3); line-height: 1.5; }
.left-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.left-scroll::-webkit-scrollbar { width: 3px; }
.left-scroll::-webkit-scrollbar-thumb { background: var(--br); border-radius: 3px; }
.left-foot {
  padding: 12px 14px;
  border-top: 1px solid var(--br);
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex-shrink: 0;
}

/* ── RIGHT ── */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.right-head {
  padding: 13px 20px;
  border-bottom: 1px solid var(--br);
  background: var(--s1);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.right-title {
  font-family: 'Instrument Serif', serif;
  font-size: 16px;
}
.right-actions { margin-left: auto; display: flex; gap: 7px; }
.right-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
}
.right-body::-webkit-scrollbar { width: 4px; }
.right-body::-webkit-scrollbar-thumb { background: var(--br); border-radius: 4px; }

/* ── FORM ── */
.field { display: flex; flex-direction: column; gap: 5px; }
.lbl {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--txt3);
}
input[type=text], textarea, select {
  background: var(--s2);
  border: 1px solid var(--br);
  border-radius: 8px;
  color: var(--txt);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  padding: 8px 11px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
input:focus, textarea:focus { border-color: var(--acc); }
textarea { resize: vertical; min-height: 70px; line-height: 1.55; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-acc { background: var(--acc); color: white; }
.btn-acc:hover { background: #ff7055; }
.btn-ghost { background: var(--s3); color: var(--txt2); border: 1px solid var(--br); }
.btn-ghost:hover { border-color: var(--br2); color: var(--txt); }
.btn-green { background: #1a3a1a; color: var(--acc3); border: 1px solid #2a5a2a; }
.btn-green:hover { background: #1f451f; }
.btn-blue { background: #0d2a38; color: var(--acc2); border: 1px solid #1a4a60; }
.btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 5px; }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── CARDS ── */
.card {
  background: var(--s2);
  border: 1px solid var(--br);
  border-radius: var(--r);
  padding: 11px 13px;
  transition: border-color 0.15s;
  position: relative;
}
.card.approved { border-color: #2a5a2a; background: #0f1f0f; }
.card.rejected { opacity: 0.35; }
.card-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
.card-sub { font-size: 12px; color: var(--txt2); line-height: 1.5; }
.card-row { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; align-items: center; }

.tag {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.tag-g { background: #1a3a1a; color: var(--acc3); }
.tag-r { background: #3a1a1a; color: #ff7070; }
.tag-o { background: #2a1a0a; color: var(--gold); }
.tag-b { background: #0a1e2a; color: var(--acc2); }

/* ── AD BLOCK ── */
.adb {
  background: var(--s1);
  border: 1px solid var(--br);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
}
.adb-head {
  padding: 9px 14px;
  background: var(--s2);
  border-bottom: 1px solid var(--br);
  display: flex;
  align-items: center;
  gap: 8px;
}
.adb-num {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--txt3);
  min-width: 36px;
}
.adb-body { padding: 13px 14px; display: flex; flex-direction: column; gap: 10px; }

/* ── PROMPT BOX ── */
.pbox {
  background: var(--s3);
  border: 1px solid var(--br);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--txt2);
  line-height: 1.6;
}

/* ── WINNING ADS LIBRARY ── */
.wlib {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.wimg-card {
  background: var(--s2);
  border: 1px solid var(--br);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  gap: 0;
}
.wimg-thumb {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
  object-fit: cover;
  background: var(--s3);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--txt3);
  font-size: 22px;
}
.wimg-thumb img { width: 100%; height: 100%; object-fit: cover; }
.wimg-info {
  flex: 1;
  padding: 9px 11px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.wimg-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wimg-note { font-size: 11px; color: var(--txt2); line-height: 1.4; }
.wimg-del { background: none; border: none; color: var(--txt3); cursor: pointer; padding: 4px; font-size: 14px; flex-shrink: 0; align-self: flex-start; margin: 6px 6px 0 0; }
.wimg-del:hover { color: #ff7070; }

.wcopy-card {
  background: var(--s2);
  border: 1px solid var(--br);
  border-radius: 10px;
  padding: 10px 12px;
  position: relative;
}
.wcopy-pt { font-size: 12px; color: var(--txt); line-height: 1.5; margin-bottom: 5px; }
.wcopy-hl { font-size: 11px; font-weight: 700; color: var(--gold); }
.wcopy-del { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--txt3); cursor: pointer; font-size: 13px; }
.wcopy-del:hover { color: #ff7070; }

/* ── UPLOAD DROP ZONE ── */
.dropzone {
  border: 1.5px dashed var(--br2);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--s2);
}
.dropzone:hover, .dropzone.drag { border-color: var(--acc); background: #ff5c3808; }
.dropzone-icon { font-size: 24px; margin-bottom: 6px; }
.dropzone-text { font-size: 12px; color: var(--txt2); }
.dropzone input { display: none; }

/* ── SECTION DIVIDER ── */
.sdiv {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--txt3);
  padding: 0 0 6px;
  border-bottom: 1px solid var(--br);
  margin-bottom: 10px;
}

/* ── CALLOUT ── */
.callout {
  background: #0d2238;
  border: 1px solid #1a4060;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--txt2);
  line-height: 1.7;
  margin-bottom: 14px;
}
.callout strong { color: var(--acc2); }

/* ── TABLE ── */
.twrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--br); }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 860px; }
thead th {
  background: var(--s3);
  color: var(--txt2);
  padding: 9px 12px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  border-bottom: 1px solid var(--br);
}
tbody td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--br);
  color: var(--txt);
  vertical-align: top;
  max-width: 180px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--s2); }

/* ── EMPTY ── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 48px 20px;
  color: var(--txt3);
  text-align: center;
}
.empty-ico { font-size: 30px; }
.empty-txt { font-size: 12px; max-width: 220px; line-height: 1.6; }

/* ── SPINNER ── */
.spin {
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: rot 0.65s linear infinite;
  display: none;
  flex-shrink: 0;
}
@keyframes rot { to { transform: rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  background: var(--s4);
  border: 1px solid var(--br2);
  color: var(--txt);
  padding: 9px 18px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  animation: tup 0.2s ease;
  white-space: nowrap;
}
@keyframes tup { from { opacity:0; transform: translateX(-50%) translateY(6px); } }

/* section toggles */
.stoggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--s2);
  border: 1px solid var(--br);
  user-select: none;
}
.stoggle:hover { border-color: var(--br2); }
.stoggle-label { font-size: 12px; font-weight: 600; }
.stoggle-arrow { font-size: 10px; color: var(--txt3); transition: transform 0.2s; }
.stoggle-arrow.open { transform: rotate(180deg); }
.scollapse { display: none; }
.scollapse.open { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }

/* badge count */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 100px; font-size: 10px; font-weight: 700;
}
.badge-acc { background: var(--acc); color: white; }
.badge-green { background: #1a3a1a; color: var(--acc3); }
.badge-dim { background: var(--s3); color: var(--txt3); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">Ad<span class="brand-dot">.</span>Flow</div>
  <div class="topbar-div"></div>
  <div class="topbar-label">FB Campaign Builder → Bulk CSV</div>
  <div class="keybar">
    <input type="password" id="keyIn" placeholder="sk-ant-api key…" />
    <button class="btn btn-ghost btn-sm" onclick="saveKey()">Save</button>
    <span id="kstat"></span>
  </div>
  <div class="topbar-div"></div>
  <div class="steps" id="steps"></div>
</div>

<!-- BODY -->
<div class="body">
  <div class="left">
    <div class="left-head">
      <div class="left-title" id="ltitle"></div>
      <div class="left-hint" id="lhint"></div>
    </div>
    <div class="left-scroll" id="lscroll"></div>
    <div class="left-foot" id="lfoot"></div>
  </div>
  <div class="right">
    <div class="right-head">
      <div class="right-title" id="rtitle"></div>
      <div class="right-actions" id="ract"></div>
    </div>
    <div class="right-body" id="rbody"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const S = {
  key: localStorage.getItem('af2_key') || '',
  step: 1,

  // Brief
  brief: JSON.parse(localStorage.getItem('af2_brief') || JSON.stringify({
    campaignName: '', type: '', offer: '', audience: '', context: '', url: ''
  })),

  // Winning image ads library
  winImgs: [], // in-memory only (no localStorage limit) — [{id, name, dataUrl, note}]

  // Winning copy library
  winCopies: JSON.parse(localStorage.getItem('af2_wcopies') || '[]'),
  // [{id, primaryText, headline}]

  // Generated
  angles: [],
  ideas: [],
  prompts: [],
  copies: [],
};

function saveBrief() { localStorage.setItem('af2_brief', JSON.stringify(S.brief)); }
function saveWimgs() { /* images kept in memory only — no localStorage size limit */ }
function saveWcopies() { localStorage.setItem('af2_wcopies', JSON.stringify(S.winCopies)); }

if (S.key) {
  document.getElementById('keyIn').value = S.key;
  document.getElementById('kstat').innerHTML = '<span style="font-size:11px;color:var(--acc3);font-weight:600">✓ Ready</span>';
}

function saveKey() {
  S.key = document.getElementById('keyIn').value.trim();
  localStorage.setItem('af2_key', S.key);
  document.getElementById('kstat').innerHTML = S.key
    ? '<span style="font-size:11px;color:var(--acc3);font-weight:600">✓ Ready</span>'
    : '<span style="font-size:11px;color:var(--txt3)">No key</span>';
  toast('API key saved');
}

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
async function claude(userMsg, sys, images) {
  if (!S.key) { toast('Add your Anthropic API key first'); return null; }
  try {
    let content;
    if (images && images.length) {
      content = [
        ...images.map(img => ({
          type: 'image',
          source: { type: 'base64', media_type: img.mediaType, data: img.data }
        })),
        { type: 'text', text: userMsg }
      ];
    } else {
      content = userMsg;
    }
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content }]
    };
    if (sys) body.system = sys;
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.error) { toast('API: ' + d.error.message); return null; }
    return d.content[0].text;
  } catch(e) { toast('Network error: ' + e.message); return null; }
}

function parseJ(t) {
  try { return JSON.parse(t.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim()); }
  catch { return null; }
}

// ══════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════
const STEPS = ['Brief','Angles','Concepts','Prompts','Copy','Export'];
function renderNav() {
  document.getElementById('steps').innerHTML = STEPS.map((l,i) => {
    const n = i+1, cls = n===S.step?'active':n<S.step?'done':'';
    return `<button class="stab ${cls}" onclick="goStep(${n})">${l}</button>`;
  }).join('');
}
function goStep(n) {
  if (n > S.step + 1) { toast('Finish current step first'); return; }
  S.step = n; render();
}

// ══════════════════════════════════════════════
// MASTER RENDER
// ══════════════════════════════════════════════
function render() {
  renderNav();
  const steps = [null, renderS1, renderS2, renderS3, renderS4, renderS5, renderS6];
  steps[S.step]();
}

function setLeft(title, hint, scrollHTML, footHTML) {
  document.getElementById('ltitle').textContent = title;
  document.getElementById('lhint').textContent = hint;
  document.getElementById('lscroll').innerHTML = scrollHTML;
  document.getElementById('lfoot').innerHTML = footHTML;
}
function setRight(title, actionsHTML, bodyHTML) {
  document.getElementById('rtitle').textContent = title;
  document.getElementById('ract').innerHTML = actionsHTML || '';
  document.getElementById('rbody').innerHTML = bodyHTML;
}

// ══════════════════════════════════════════════
// STEP 1 — BRIEF
// ══════════════════════════════════════════════
function renderS1() {
  const b = S.brief;
  setLeft('Campaign Brief',
    'Describe what you\'re running. Works for products, services, offers, lead gen — anything.',
    `
    <div class="field"><div class="lbl">Campaign Name</div>
      <input type="text" value="${x(b.campaignName)}" placeholder="e.g. SkinGlow — Aug Split Test" oninput="S.brief.campaignName=this.value;saveBrief()" /></div>

    <div class="field"><div class="lbl">What are you running?</div>
      <input type="text" value="${x(b.type)}" placeholder="e.g. Supplement, Coaching program, SaaS, Lead magnet…" oninput="S.brief.type=this.value;saveBrief()" /></div>

    <div class="field"><div class="lbl">Full Context</div>
      <textarea style="min-height:110px" placeholder="Explain everything: what it is, what it does, key benefits, differentiators, price point, what makes it unique…" oninput="S.brief.context=this.value;saveBrief()">${x(b.context)}</textarea></div>

    <div class="field"><div class="lbl">Target Audience</div>
      <textarea style="min-height:60px" placeholder="Who are they? Demographics, pain points, desires, awareness level…" oninput="S.brief.audience=this.value;saveBrief()">${x(b.audience)}</textarea></div>

    <div class="field"><div class="lbl">Offer / Hook</div>
      <input type="text" value="${x(b.offer)}" placeholder="e.g. 50% off first month, free strategy call, limited spots…" oninput="S.brief.offer=this.value;saveBrief()" /></div>

    <div class="field"><div class="lbl">Landing Page URL</div>
      <input type="text" value="${x(b.url)}" placeholder="https://…" oninput="S.brief.url=this.value;saveBrief()" /></div>
    `,
    `<button class="btn btn-acc btn-full" onclick="goStep(2)">Continue to Angles →</button>`
  );

  // Right side: winning libraries
  setRight('Winning Ads Library', '', renderLibraries());
}

function renderLibraries() {
  return `
    <div class="callout">

// ── Winning image handlers ──
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dz').classList.remove('drag');
  handleImgFiles(e.dataTransfer.files);
}
function handleImgFiles(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      S.winImgs.push({ id: uid(), name: f.name, dataUrl: ev.target.result, note: '' });
      saveWimgs();
      // re-render right panel
      document.getElementById('rbody').innerHTML = renderLibraries();
    };
    reader.readAsDataURL(f);
  });
}
function updateWimg(id, field, val) {
  const img = S.winImgs.find(i=>i.id===id);
  if (img) { img[field]=val; saveWimgs(); }
}
function removeWimg(id) {
  S.winImgs = S.winImgs.filter(i=>i.id!==id);
  saveWimgs();
  document.getElementById('rbody').innerHTML = renderLibraries();
}

// ── Winning copy handlers ──
function addWcopy() {
  const pt = document.getElementById('newPT').value.trim();
  const hl = document.getElementById('newHL').value.trim();
  if (!pt && !hl) { toast('Paste at least primary text or headline'); return; }
  S.winCopies.push({ id: uid(), primaryText: pt, headline: hl });
  saveWcopies();
  document.getElementById('newPT').value = '';
  document.getElementById('newHL').value = '';
  document.getElementById('rbody').innerHTML = renderLibraries();
  toast('Added to library');
}
function removeWcopy(id) {
  S.winCopies = S.winCopies.filter(c=>c.id!==id);
  saveWcopies();
  document.getElementById('rbody').innerHTML = renderLibraries();
}

Target Audience: ${b.audience}

    `<button class="btn btn-acc btn-full" onclick="dlCSV()">⬇ Download FB Import CSV</button>
     <button class="btn btn-ghost btn-full" onclick="cpCSV()">📋 Copy CSV</button>
     <button class="btn btn-ghost btn-sm" onclick="goStep(5)">← Back</button>`
  );

  setRight(`${rows.length} Ads Ready`,
    `<button class="btn btn-acc btn-sm" onclick="dlCSV()">⬇ Download CSV</button>`,
    rows.length ? `
    <div class="callout">
      <strong>📌 FB Ads Manager Bulk Import:</strong> Ads Manager → Ads table → click <strong>Import</strong> (top right) → Upload CSV → FB creates everything. Attach images manually — use the "Image Prompt" reference column to match each ad to the right generated image.
    </div>
    <div class="twrap">
      <table>
        <thead><tr>
          <th>#</th><th>Campaign</th><th>Ad Set</th><th>Ad Name</th>
          <th>Primary Text</th><th>Headline</th><th>CTA</th><th>URL</th><th>Image Prompt (ref)</th>
        </tr></thead>
        <tbody>${rows.map((r,i)=>`<tr>
          <td>${i+1}</td>
          <td title="${x(r.campaignName)}">${x(r.campaignName)}</td>
          <td title="${x(r.adSetName)}">${x(r.adSetName)}</td>
          <td title="${x(r.adName)}">${x(r.adName)}</td>
          <td title="${x(r.primaryText)}">${x(r.primaryText)}</td>
          <td title="${x(r.headline)}">${x(r.headline)}</td>
          <td>${r.cta}</td>
          <td title="${x(r.url)}">${x(r.url)}</td>
          <td title="${x(r.imagePrompt)}">${x((r.imagePrompt||'').slice(0,55))}…</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>` : `<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">No ads ready. Complete previous steps.</div></div>`
  );
}

function buildRows() {
  const rows = [];
  S.angles.filter(a=>a.status==='approved').forEach(angle=>{
    S.ideas.filter(i=>i.angleId===angle.id&&i.status==='approved').forEach((idea,n)=>{
      const copy = S.copies.find(c=>c.ideaId===idea.id)||{};
      const prompt = S.prompts.find(p=>p.ideaId===idea.id)||{};
      rows.push({
        campaignName: S.brief.campaignName||S.brief.type||'Campaign',
        campaignObjective: 'OUTCOME_SALES',
        adSetName: `${angle.title} — Adset`,
        adName: `${idea.concept} — v${n+1}`,
        primaryText: copy.primaryText||'',
        headline: copy.headline||'',
        description: copy.description||'',
        cta: 'SHOP_NOW',
        url: S.brief.url||'',
        feedFB: 'true', feedIG: 'true', stories: 'true', reels: 'true',
        angle: angle.title,
        concept: idea.concept,
        hook: idea.hook,
        imagePrompt: prompt.prompt||'',
      });
    });
  });
  return rows;
}

function getCSV() {
  const rows = buildRows();
  const h = ['Campaign Name','Campaign Objective','Ad Set Name','Ad Name',
    'Primary Text','Headline','Link Description','Call To Action','Website URL',
    'Facebook Feed','Instagram Feed','Stories','Reels',
    'Angle (ref)','Concept (ref)','Hook (ref)','Image Prompt (ref)'];
  const body = rows.map(r=>[
    r.campaignName,r.campaignObjective,r.adSetName,r.adName,
    r.primaryText,r.headline,r.description,r.cta,r.url,
    r.feedFB,r.feedIG,r.stories,r.reels,
    r.angle,r.concept,r.hook,r.imagePrompt
  ].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
  return [h.join(','),...body].join('\n');
}

function dlCSV() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([getCSV()],{type:'text/csv'}));
  a.download = `fb_${(S.brief.campaignName||S.brief.type||'campaign').replace(/\s+/g,'_')}.csv`;
  a.click(); toast('Downloading…');
}
function cpCSV() { navigator.clipboard.writeText(getCSV()).then(()=>toast('CSV copied!')); }

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function setStatus(list, id, status) {
  const item = S[list].find(i=>i.id===id);
  if (item) { item.status=status; render(); }
}
function spin(id, on) {
  const el = document.getElementById(id);
  if (el) el.style.display = on?'flex':'none';
}
function uid() { return Math.random().toString(36).slice(2,9); }
function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function copyText(t) { navigator.clipboard.writeText(t).then(()=>toast('Copied!')); }
function toast(msg) {
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2000);
}

// ── BOOT ──
render();
</script>
</body>
</html>
