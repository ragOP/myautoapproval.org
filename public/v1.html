<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMI Payment Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; color: #333; }
        .header { border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { margin: 0; color: #2c3e50; font-size: 22pt; }
        .details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; background: #f8f9fa; padding: 15px; border-radius: 5px; }
        .details div { font-size: 11pt; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background-color: #2c3e50; color: white; padding: 12px; text-align: left; font-size: 10pt; text-transform: uppercase; }
        td { border: 1px solid #dee2e6; padding: 10px; font-size: 10pt; vertical-align: middle; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .center { text-align: center; }
        .col-no { width: 40px; }
        .col-date { width: 100px; }
        .col-amt { width: 100px; }
        .col-status { width: 80px; }
        .checkbox { width: 20px; height: 20px; border: 1px solid #999; display: inline-block; }
        @media print {
            thead { display: table-header-group; }
            tr { page-break-inside: avoid; }
            body { margin: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>EMI Payment Tracker</h1>
    <p style="margin: 5px 0; color: #7f8c8d;">Personal Financial Record</p>
</div>

<div class="details">
    <div><strong>Monthly EMI:</strong> ₹27,000</div>
    <div><strong>Start Date:</strong> 15 April 2026</div>
    <div><strong>Payment Date:</strong> 15th of every month</div>
    <div><strong>Duration:</strong> 10 Years (120 Months)</div>
</div>

<table>
    <thead>
        <tr>
            <th class="col-no">#</th>
            <th class="col-date">Due Date</th>
            <th class="col-amt">Amount</th>
            <th class="col-status center">Status</th>
            <th>Notes</th>
        </tr>
    </thead>
    <tbody id="tracker-body">
        </tbody>
</table>

<script>
    const tbody = document.getElementById('tracker-body');
    const startDate = new Date(2026, 3, 15); // April 15, 2026

    for (let i = 1; i <= 120; i++) {
        let current = new Date(2026, 3 + (i - 1), 15);
        let dateString = current.toLocaleDateString('en-GB', {
            day: '2-digit', month: 'short', year: 'numeric'
        });

        let row = `<tr>
            <td class="center">${i}</td>
            <td>${dateString}</td>
            <td>₹27,000</td>
            <td class="center"><div class="checkbox"></div></td>
            <td></td>
        </tr>`;
        tbody.innerHTML += row;
    }
</script>

</body>
</html>
